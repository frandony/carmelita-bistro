<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carmelita Restaurante & Bistrô — Praia da Costa, Vila Velha/ES</title>
  <meta name="description"
    content="Restaurante e bistrô intimista na Praia da Costa, Vila Velha/ES. Culinária autoral do Cheff Gastão. Qui e Sex 19h–23h · Sáb e Dom 12h–16h. Reservas somente por ligação: (27) 99747-5391." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Great+Vibes&family=Pinyon+Script&family=Oswald:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Raleway:wght@300;400&display=swap"
    rel="stylesheet" />

  <style>
    @font-face {
      font-family: "Exmouth";
      src: url("assets/exmouth.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --preto-vintage: #111111;
      --off-white: #F4F0EA;
      --bege-areia: #D8C7AE;
      --bronze-rock: #8A6A44;
      --bronze-glow: #B58858;
      --grafite: #2B2B2B;
      --grafite-soft: #1B1B1B;

      /* Azul real da casa (logo oficial / faixa da parede do salão) — cor de apoio */
      --azul-carmelita: #2596D1;
      --azul-glow: #5FB4E3;

      --font-display: "DM Serif Display", "Times New Roman", serif;
      --font-rock: "Oswald", "Arial Narrow", sans-serif;
      --font-body: "Cormorant Garamond", "Georgia", serif;
      --font-script: "Pinyon Script", "Great Vibes", "Exmouth", cursive;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: var(--preto-vintage);
      color: var(--off-white);
      font-family: var(--font-body);
      font-size: 18px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    ::selection {
      background: var(--bronze-rock);
      color: var(--off-white);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
    }

    input,
    select,
    textarea {
      font-family: inherit;
      color: inherit;
    }

    /* ===== Grain overlay ===== */
    .grain {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      opacity: 0.08;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95 0 0 0 0 0.92 0 0 0 0 0.88 0 0 0 0.55 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }

    /* ===== Nav ===== */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      background: linear-gradient(to bottom, rgba(17, 17, 17, 0.92) 0%, rgba(17, 17, 17, 0.75) 60%, rgba(17, 17, 17, 0) 100%);
      backdrop-filter: blur(6px);
      transition: padding 0.4s ease, background 0.4s ease;
    }

    .nav.scrolled {
      padding: 12px 48px;
      background: rgba(17, 17, 17, 0.96);
      border-bottom: 1px solid rgba(138, 106, 68, 0.18);
    }

    .nav-brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      cursor: pointer;
      transition: opacity 0.5s ease;
    }

    .nav-brand.discreet {
      opacity: 0.55;
    }

    .nav-brand.discreet:hover {
      opacity: 1;
    }

    .nav-brand-text {
      font-family: var(--font-script);
      font-size: 30px;
      line-height: 1;
      background: linear-gradient(148deg, #b07c2a 0%, #e8d48a 20%, #faf2d8 38%, #d4a840 55%, #f0e09c 74%, #b88030 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-brand-resto {
      font-family: var(--font-rock);
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(244, 240, 234, 0.6);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .nav-phone {
      font-family: var(--font-rock);
      font-size: 12px;
      letter-spacing: 0.18em;
      color: rgba(244, 240, 234, 0.6);
      transition: color 0.3s ease;
    }

    .nav-phone:hover {
      color: var(--azul-glow);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 44px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-link {
      font-family: var(--font-rock);
      font-size: 13px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--off-white);
      position: relative;
      padding: 6px 0;
      transition: color 0.3s ease;
    }

    .nav-link:hover {
      color: var(--azul-glow);
    }

    .nav-link.active {
      color: var(--bronze-glow);
    }

    .nav-link.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -4px;
      width: 18px;
      height: 1px;
      background: var(--bronze-rock);
      transform: translateX(-50%);
    }

    .nav-cta {
      font-family: var(--font-rock);
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--off-white);
      border: 1px solid var(--bronze-rock);
      padding: 11px 22px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .nav-cta:hover {
      background: var(--bronze-rock);
      color: var(--off-white);
    }

    .nav-burger {
      display: none;
    }

    /* Notebook: evita colisão entre marca, links centrais e ações à direita */
    @media (max-width: 1200px) and (min-width: 881px) {
      .nav {
        padding: 16px 28px;
      }

      .nav-phone {
        display: none;
      }

      .nav-links {
        gap: 26px;
      }

      .nav-link {
        font-size: 12px;
        letter-spacing: 0.24em;
      }

      .nav-brand-text {
        font-size: 26px;
      }
    }

    .mobile-menu {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--preto-vintage);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      transform: translateY(-100%);
      transition: transform 0.5s cubic-bezier(0.7, 0, 0.3, 1);
    }

    .mobile-menu.open {
      transform: translateY(0);
    }

    @media (max-width: 880px) {
      .nav {
        padding: 14px 22px;
      }

      .nav-brand {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
      }

      .nav-links,
      .nav-right {
        display: none;
      }

      .nav-burger {
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding: 6px;
        margin-left: auto;
      }

      .nav-burger span {
        width: 22px;
        height: 1px;
        background: var(--off-white);
        display: block;
      }

      .mobile-menu .nav-link {
        font-size: 22px;
        letter-spacing: 0.4em;
      }

      .mobile-close {
        position: absolute;
        top: 22px;
        right: 22px;
        font-size: 28px;
        color: var(--off-white);
      }
    }

    .mobile-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .mobile-brand .nav-brand-text {
      font-size: 44px;
    }

    .mobile-foot {
      font-family: var(--font-rock);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-align: center;
      line-height: 2;
      color: rgba(244, 240, 234, 0.45);
      margin-top: 10px;
    }

    /* ===== Page wrapper ===== */
    .page {
      min-height: 100vh;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 48px;
    }

    @media (max-width: 700px) {
      .container {
        padding: 0 22px;
      }
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 720px;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 50% 38%, rgba(181, 136, 88, 0.3) 0%, rgba(181, 136, 88, 0.1) 30%, transparent 65%),
        radial-gradient(ellipse at 85% 110%, rgba(138, 106, 68, 0.3) 0%, transparent 50%),
        linear-gradient(180deg, rgba(27, 27, 27, 0.75) 0%, rgba(17, 17, 17, 0.95) 100%),
        url("assets/Parte de fundo do site do carmelita.png");
      background-size: cover, cover, cover, 150% auto;
      background-position: center;
      background-attachment: fixed;
    }

    /* Mobile/tablet: fixed attachment é bugado em navegadores móveis */
    @media (max-width: 880px) {
      .hero-bg {
        background-attachment: scroll;
        background-size: cover, cover, cover, cover;
      }
    }

    .hero-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(90deg, rgba(244, 240, 234, 0.018) 0 1px, transparent 1px 80px),
        repeating-linear-gradient(0deg, rgba(244, 240, 234, 0.018) 0 1px, transparent 1px 80px);
    }

    .hero-content {
      position: relative;
      text-align: center;
      padding: 0 24px;
      z-index: 2;
    }

    .hero-eyebrow {
      font-family: var(--font-rock);
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--bronze-glow);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      margin-top: 20px;
    }

    .hero-eyebrow::before,
    .hero-eyebrow::after {
      content: "";
      width: 38px;
      height: 1px;
      background: var(--bronze-rock);
    }


    .hero-logo-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 0;
      margin: 40px 0 0;
    }

    .hero-logo-mark {
      display: block;
      width: auto;
      margin: 0 auto;
      position: static;
      transform: translateY(-20px);
      filter: drop-shadow(0 2px 14px rgba(201, 168, 76, 0.4));
    }

    .hero-logo-mark svg {
      display: block;
      width: clamp(175px, 46vw, 475px);
      height: auto;
    }

    .hero-wordmark {
      font-family: var(--font-script);
      font-size: clamp(108px, 14.5vw, 188px);
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 0.95;
      padding: 0;
      background: linear-gradient(148deg,
          #b07c2a 0%,
          #e8d48a 20%,
          #faf2d8 38%,
          #d4a840 55%,
          #f0e09c 74%,
          #b88030 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      width: fit-content;
      max-width: 100%;
      margin: 0 0 10px;
      text-align: center;
      white-space: nowrap;
      filter:
        drop-shadow(0 0 22px rgba(212, 168, 60, 0.28)) drop-shadow(0 2px 6px rgba(0, 0, 0, 0.32));
      animation: wordmarkGlow 5s ease-in-out infinite;
    }

    @keyframes wordmarkGlow {

      0%,
      100% {
        filter: drop-shadow(0 0 22px rgba(212, 168, 60, 0.28)) drop-shadow(0 2px 6px rgba(0, 0, 0, 0.32));
      }

      50% {
        filter: drop-shadow(0 0 34px rgba(212, 168, 60, 0.46)) drop-shadow(0 2px 6px rgba(0, 0, 0, 0.32));
      }
    }

    .hero-wordmark .amp {
      display: inline-block;
      font-style: italic;
      transform: translateY(-0.05em);
    }

    .hero-resto {
      font-family: 'Raleway', sans-serif;
      font-size: clamp(13px, 1.4vw, 20px);
      font-weight: 300;
      letter-spacing: 0.8em;
      text-transform: uppercase;
      color: var(--off-white);
      opacity: 0.88;
      margin: 0;
      padding-left: 0.8em;
      transform: translateY(-100px);
    }

    .hero-tagline {
      font-family: var(--font-body);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(20px, 2.4vw, 30px);
      color: var(--bege-areia);
      letter-spacing: 0.01em;
      max-width: 640px;
      margin-left: auto;
      margin-right: auto;
      transform: scaleX(1.15);
      transform-origin: center;
    }

    .hero-tagline em {
      color: var(--off-white);
      font-style: italic;
    }

    .hero-verse {
      font-family: var(--font-body);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(13px, 1.05vw, 15px);
      line-height: 1.7;
      letter-spacing: 0.01em;
      color: rgba(244, 240, 234, 0.5);
      max-width: 460px;
      margin: 20px auto 0;
    }

    .hero-verse-author {
      display: block;
      font-family: var(--font-rock);
      font-style: normal;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--bronze-glow);
      margin-top: 12px;
    }

    .hero-ctas {
      margin-top: -8px;
    }


    .btn {
      display: inline-block;
      font-family: var(--font-rock);
      font-size: 12px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      padding: 18px 36px;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
      text-align: center;
      margin-top: 80px;
      margin-bottom: 80px;
    }

    .btn-primary {
      background: var(--off-white);
      color: var(--preto-vintage);
    }

    .btn-primary:hover {
      background: var(--bronze-glow);
      color: var(--off-white);
      transform: translateY(-2px);
    }

    .btn-ghost {
      border: 1px solid var(--bege-areia);
      color: var(--off-white);
    }

    .btn-ghost:hover {
      border-color: var(--bronze-glow);
      color: var(--bronze-glow);
      transform: translateY(-2px);
    }

    .hero-meta {
      position: absolute;
      bottom: 36px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      z-index: 2;
    }

    .hero-meta-item {
      font-family: var(--font-rock);
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(244, 240, 234, 0.55);
    }

    .hero-meta-item .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--bronze-glow);
      border-radius: 50%;
      margin-right: 10px;
      box-shadow: 0 0 10px var(--bronze-glow);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.6;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.25);
      }
    }

    .scroll-indicator {
      position: absolute;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%);
      font-family: var(--font-rock);
      font-size: 10px;
      letter-spacing: 0.4em;
      color: rgba(244, 240, 234, 0.45);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      z-index: 2;
    }

    @media (max-width: 700px) {
      .hero-meta {
        display: none;
      }

      .hero-eyebrow {
        font-size: 10px;
      }

      .hero-logo-mark svg {
        width: clamp(200px, 58vw, 400px);
      }

      .hero-logo-mark {
        transform: translateY(-25px);
      }

      .hero-text-stack {
        transform: translateY(40px);
      }

      .hero-logo-group {
        transform: translateY(10px);
      }
    }

    /* ===== Notebook (701px – 1366px) ===== */
    @media (max-width: 1366px) and (min-width: 701px) {
      .hero-logo-mark svg {
        width: clamp(155px, 39vw, 500px);
      }

      .hero-logo-mark {
        transform: translateY(-60px);
      }

      .hero-text-stack {
        transform: translateY(-30px);
      }

      .hero-wordmark.reveal.in {
        transform: translateY(-75px);
      }

      .hero-resto.reveal.in {
        transform: translateY(-75px);
      }

      .hero-ctas.reveal.in {
        transform: translateY(-50px);
      }
    }

    /* ===== Section base ===== */
    section.block {
      padding: 140px 0;
      position: relative;
    }

    .block-eyebrow {
      font-family: var(--font-rock);
      font-size: 12px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--bronze-glow);
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .block-eyebrow .num {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 14px;
      color: var(--bege-areia);
      letter-spacing: 0;
    }

    .block-eyebrow::before {
      content: "";
      display: inline-block;
      width: 36px;
      height: 1px;
      background: var(--bronze-rock);
    }

    .block-title {
      font-family: var(--font-display);
      font-size: clamp(40px, 6vw, 78px);
      line-height: 1.02;
      color: var(--off-white);
      letter-spacing: -0.005em;
      max-width: 900px;
      text-wrap: pretty;
    }

    .block-title em {
      color: var(--bronze-glow);
      font-style: italic;
    }

    .block-sub {
      font-family: var(--font-body);
      font-size: 21px;
      color: var(--bege-areia);
      max-width: 620px;
      margin-top: 22px;
    }

    /* ===== Diferenciais ===== */
    .diffs {
      background: var(--grafite-soft);
      border-top: 1px solid rgba(138, 106, 68, 0.18);
      border-bottom: 1px solid rgba(138, 106, 68, 0.18);
    }

    .diffs-grid {
      margin-top: 80px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border-top: 1px solid rgba(216, 199, 174, 0.12);
    }

    .diff {
      padding: 56px 36px 48px;
      border-right: 1px solid rgba(216, 199, 174, 0.12);
      border-bottom: 1px solid rgba(216, 199, 174, 0.12);
      position: relative;
      transition: background 0.4s ease;
    }

    .diff:last-child {
      border-right: none;
    }

    .diff:hover {
      background: rgba(138, 106, 68, 0.06);
    }

    .diff-num {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 16px;
      color: var(--bronze-glow);
      margin-bottom: 28px;
      display: block;
      letter-spacing: 0.05em;
    }

    .diff-icon {
      width: 56px;
      height: 56px;
      margin-bottom: 32px;
      border: 1px solid var(--bronze-rock);
      border-radius: 50%;
      display: grid;
      place-items: center;
      transition: all 0.4s ease;
    }

    .diff:hover .diff-icon {
      background: var(--bronze-rock);
      transform: rotate(-6deg);
    }

    .diff-icon svg {
      width: 24px;
      height: 24px;
      stroke: var(--bege-areia);
    }

    .diff:hover .diff-icon svg {
      stroke: var(--off-white);
    }

    .diff-title {
      font-family: var(--font-display);
      font-size: 32px;
      line-height: 1.1;
      margin-bottom: 14px;
      color: var(--off-white);
    }

    .diff-text {
      font-size: 17px;
      line-height: 1.55;
      color: rgba(216, 199, 174, 0.85);
    }

    @media (max-width: 880px) {
      .diffs-grid {
        grid-template-columns: 1fr;
      }

      .diff {
        border-right: none;
      }
    }

    /* ===== Mood gallery ===== */
    .mood {
      background: var(--preto-vintage);
    }

    .mood-grid {
      margin-top: 80px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-auto-rows: 120px;
      gap: 16px;
    }

    .mood-tile {
      position: relative;
      overflow: hidden;
      background: var(--grafite);
      transition: transform 0.6s cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    .mood-tile:hover {
      transform: scale(0.98);
    }

    .mood-tile::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(17, 17, 17, 0.65) 100%);
      pointer-events: none;
    }

    .mood-label {
      position: absolute;
      bottom: 16px;
      left: 18px;
      font-family: var(--font-rock);
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--off-white);
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mood-label::before {
      content: "";
      width: 14px;
      height: 1px;
      background: var(--bronze-glow);
    }

    /* Foto real dentro dos tiles */
    .mood-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.82) saturate(0.9);
      transition: filter 0.5s ease, transform 0.6s cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    .mood-tile:hover .mood-photo {
      filter: brightness(0.95) saturate(1);
    }

    .mood-tile.t1 {
      grid-column: span 5;
      grid-row: span 3;
    }

    .mood-tile.t2 {
      grid-column: span 4;
      grid-row: span 2;
    }

    .mood-tile.t3 {
      grid-column: span 3;
      grid-row: span 2;
    }

    .mood-tile.t4 {
      grid-column: span 4;
      grid-row: span 2;
    }

    .mood-tile.t5 {
      grid-column: span 3;
      grid-row: span 3;
    }

    .mood-tile.t6 {
      grid-column: span 5;
      grid-row: span 2;
    }

    @media (max-width: 880px) {
      .mood-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: 160px;
      }

      .mood-tile.t1,
      .mood-tile.t2,
      .mood-tile.t3,
      .mood-tile.t4,
      .mood-tile.t5,
      .mood-tile.t6 {
        grid-column: span 1;
        grid-row: span 1;
      }

      .mood-tile.t1 {
        grid-column: span 2;
        grid-row: span 2;
      }
    }

    /* Placeholder textures */
    .ph {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    .ph-stripes {
      background-image: repeating-linear-gradient(45deg,
          rgba(216, 199, 174, 0.06) 0 6px,
          rgba(216, 199, 174, 0.02) 6px 12px),
        radial-gradient(ellipse at 30% 30%, rgba(181, 136, 88, 0.18), transparent 60%);
      background-color: var(--grafite);
    }

    .ph-warm {
      background-image: repeating-linear-gradient(90deg,
          rgba(181, 136, 88, 0.10) 0 4px,
          rgba(216, 199, 174, 0.02) 4px 14px),
        radial-gradient(ellipse at 70% 50%, rgba(181, 136, 88, 0.32), transparent 60%);
      background-color: var(--grafite-soft);
    }

    .ph-deep {
      background-image: repeating-linear-gradient(135deg,
          rgba(216, 199, 174, 0.06) 0 8px,
          rgba(216, 199, 174, 0.01) 8px 18px);
      background-color: #1a1410;
    }

    .ph-pale {
      background-image: repeating-linear-gradient(45deg,
          rgba(216, 199, 174, 0.10) 0 6px,
          rgba(216, 199, 174, 0.04) 6px 12px);
      background-color: #15110d;
    }

    .ph-meta {
      font-family: "Courier New", monospace;
      font-size: 10px;
      color: rgba(244, 240, 234, 0.35);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ===== SOBRE ===== */
    .sobre-hero {
      padding: 200px 0 80px;
      position: relative;
    }

    .sobre-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 80px;
      align-items: end;
    }

    .sobre-hero-title {
      font-family: var(--font-display);
      font-size: clamp(56px, 8vw, 130px);
      line-height: 0.92;
      color: var(--off-white);
      letter-spacing: -0.01em;
    }

    .sobre-hero-title em {
      font-style: italic;
      color: var(--bronze-glow);
    }

    .sobre-hero-lead {
      font-size: 22px;
      line-height: 1.55;
      color: var(--bege-areia);
      padding-bottom: 12px;
    }

    .sobre-hero-lead::before {
      content: "";
      display: block;
      width: 60px;
      height: 1px;
      background: var(--bronze-rock);
      margin-bottom: 20px;
    }

    .sobre-editorial {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: 100px;
      align-items: start;
      padding: 80px 0 60px;
    }

    .chef-photo {
      aspect-ratio: 3 / 4;
      background: var(--grafite);
      position: relative;
      overflow: hidden;
    }

    .chef-photo-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.85) saturate(0.92);
    }

    .chef-photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 55%, rgba(17, 17, 17, 0.72) 100%);
      pointer-events: none;
    }

    .chef-photo-caption {
      position: absolute;
      bottom: 18px;
      left: 20px;
      font-family: var(--font-rock);
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--off-white);
      z-index: 2;
    }

    .chef-photo-caption .small {
      display: block;
      font-family: var(--font-display);
      font-style: italic;
      font-size: 14px;
      letter-spacing: 0.01em;
      color: var(--bege-areia);
      margin-top: 6px;
      text-transform: none;
    }

    .sobre-prose p {
      font-size: 20px;
      line-height: 1.65;
      color: var(--off-white);
      margin-bottom: 24px;
    }

    .sobre-prose p:first-child::first-letter {
      font-family: var(--font-display);
      font-size: 78px;
      line-height: 0.85;
      float: left;
      color: var(--bronze-glow);
      padding-right: 14px;
      padding-top: 6px;
    }

    .sobre-prose .signature {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 24px;
      color: var(--bronze-glow);
      margin-top: 24px;
    }

    @media (max-width: 1200px) and (min-width: 901px) {
      .sobre-editorial {
        gap: 56px;
      }

      .sobre-grid {
        gap: 48px;
      }
    }

    @media (max-width: 900px) {

      .sobre-grid,
      .sobre-editorial {
        grid-template-columns: 1fr;
        gap: 40px;
      }
    }

    /* Pull quote */
    .pullquote {
      padding: 100px 0;
      text-align: center;
      border-top: 1px solid rgba(138, 106, 68, 0.2);
      border-bottom: 1px solid rgba(138, 106, 68, 0.2);
      background: var(--grafite-soft);
      position: relative;
    }

    .pullquote-mark {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 140px;
      line-height: 0.5;
      color: var(--bronze-rock);
      display: block;
      margin-bottom: -10px;
    }

    .pullquote-text {
      font-family: var(--font-display);
      font-style: italic;
      font-size: clamp(28px, 4.5vw, 56px);
      line-height: 1.15;
      color: var(--off-white);
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .pullquote-author {
      font-family: var(--font-rock);
      font-size: 12px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--bronze-glow);
      margin-top: 38px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }

    .pullquote-author::before,
    .pullquote-author::after {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--bronze-rock);
    }

    /* Timeline */
    .timeline {
      padding: 140px 0;
    }

    .timeline-track {
      margin-top: 90px;
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .timeline-track::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 38px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--bronze-rock) 10%, var(--bronze-rock) 90%, transparent);
    }

    .tl-item {
      text-align: left;
      padding: 0 28px;
      position: relative;
      border-left: 1px solid rgba(216, 199, 174, 0.10);
    }

    .tl-item:first-child {
      border-left: none;
    }

    .tl-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--azul-carmelita);
      border: 4px solid var(--preto-vintage);
      box-shadow: 0 0 0 1px var(--azul-carmelita);
      margin: 30px 0 30px;
      position: relative;
      z-index: 2;
    }

    .tl-year {
      font-family: var(--font-display);
      font-size: 48px;
      color: var(--off-white);
      margin-bottom: 8px;
      line-height: 1;
    }

    .tl-tag {
      font-family: var(--font-rock);
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--bronze-glow);
      margin-bottom: 14px;
    }

    .tl-text {
      font-size: 16px;
      line-height: 1.55;
      color: var(--bege-areia);
    }

    @media (max-width: 900px) {
      .timeline-track {
        grid-template-columns: 1fr;
        gap: 36px;
      }

      .timeline-track::before {
        display: none;
      }

      .tl-item {
        border-left: none;
        border-top: 1px solid rgba(216, 199, 174, 0.10);
        padding-top: 24px;
      }

      .tl-item:first-child {
        border-top: none;
        padding-top: 0;
      }
    }

    /* ===== CARDÁPIO (editorial) ===== */
    .menu-hero {
      padding: 200px 0 40px;
    }

    .menu-editorial {
      max-width: 900px;
    }

    /* Seletor de cardápios */
    .menu-switch {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin: 30px 0 70px;
    }

    .menu-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px 34px 16px;
      border: 1px solid rgba(216, 199, 174, 0.18);
      background: transparent;
      position: relative;
      transition: all 0.35s ease;
      min-width: 240px;
    }

    .menu-tab:hover {
      border-color: rgba(95, 180, 227, 0.45);
    }

    .menu-tab.active {
      border-color: var(--bronze-rock);
      background: rgba(138, 106, 68, 0.08);
    }

    .menu-tab.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -1px;
      width: 42px;
      height: 2px;
      background: var(--azul-carmelita);
      transform: translateX(-50%);
    }

    .menu-tab-name {
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--off-white);
      line-height: 1.1;
    }

    .menu-tab.active .menu-tab-name {
      color: var(--bronze-glow);
    }

    .menu-tab-sub {
      font-family: var(--font-rock);
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(216, 199, 174, 0.6);
    }

    .menu-single-sub {
      text-align: center;
      font-family: var(--font-rock);
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(216, 199, 174, 0.6);
      margin: 20px 0 60px;
    }

    /* Seções por categoria */
    .menu-section {
      margin-bottom: 76px;
    }

    .menu-section-head {
      display: flex;
      align-items: center;
      gap: 26px;
      margin-bottom: 38px;
    }

    .menu-section-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: clamp(28px, 3.4vw, 40px);
      color: var(--bronze-glow);
      white-space: nowrap;
      font-weight: 400;
    }

    .menu-section-rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--bronze-rock), rgba(138, 106, 68, 0.05));
    }

    /* Linhas do cardápio */
    .menu-row {
      padding: 20px 0;
      border-bottom: 1px solid rgba(216, 199, 174, 0.08);
    }

    .menu-row:last-child {
      border-bottom: none;
    }

    .menu-row-top {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    .menu-row-name {
      font-family: var(--font-display);
      font-size: 24px;
      line-height: 1.15;
      color: var(--off-white);
      font-weight: 400;
      transition: color 0.3s ease;
    }

    .menu-row:hover .menu-row-name {
      color: var(--bronze-glow);
    }

    .menu-row-leader {
      flex: 1;
      min-width: 30px;
      border-bottom: 1px dotted rgba(216, 199, 174, 0.28);
      transform: translateY(-5px);
    }

    .menu-row-price {
      font-family: var(--font-display);
      font-size: 21px;
      color: var(--off-white);
      white-space: nowrap;
    }

    .menu-row-price .currency {
      font-family: var(--font-rock);
      font-size: 11px;
      color: var(--bronze-glow);
      letter-spacing: 0.15em;
    }

    .menu-row-desc {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 17px;
      line-height: 1.55;
      color: rgba(216, 199, 174, 0.8);
      margin-top: 8px;
      max-width: 620px;
    }

    .menu-item-tag {
      font-family: var(--font-rock);
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--azul-glow);
      border: 1px solid rgba(37, 150, 209, 0.35);
      padding: 3px 8px;
      white-space: nowrap;
    }

    /* ── Cardápio mobile: design em cards (mesma paleta) ── */
    @media (max-width: 700px) {

      /* Seletor vira controle segmentado compacto */
      .menu-switch {
        gap: 0;
        border: 1px solid rgba(216, 199, 174, 0.22);
        margin: 24px 0 48px;
      }

      .menu-tab {
        flex: 1;
        min-width: 0;
        padding: 14px 8px 12px;
        border: none;
        border-right: 1px solid rgba(216, 199, 174, 0.18);
        gap: 5px;
      }

      .menu-tab:last-child {
        border-right: none;
      }

      .menu-tab:hover {
        border-color: rgba(216, 199, 174, 0.18);
      }

      .menu-tab.active {
        border-color: rgba(216, 199, 174, 0.18);
        background: rgba(138, 106, 68, 0.14);
      }

      .menu-tab-name {
        font-size: 17px;
      }

      .menu-tab-sub {
        font-size: 8px;
        letter-spacing: 0.2em;
      }

      /* Título da categoria centralizado com filete curto */
      .menu-section-head {
        flex-direction: column;
        align-items: center;
        gap: 12px;
        text-align: center;
        margin-bottom: 24px;
      }

      .menu-section-title {
        white-space: normal;
      }

      .menu-section-rule {
        flex: none;
        width: 64px;
        background: linear-gradient(90deg, transparent, var(--bronze-rock), transparent);
      }

      /* Pratos viram cards */
      .menu-list {
        display: grid;
        gap: 14px;
      }

      .menu-row {
        border: 1px solid rgba(216, 199, 174, 0.14);
        border-left: 2px solid rgba(138, 106, 68, 0.55);
        background: linear-gradient(160deg, var(--grafite-soft) 0%, rgba(138, 106, 68, 0.07) 100%);
        padding: 18px 16px 16px;
      }

      .menu-row:last-child {
        border-bottom: 1px solid rgba(216, 199, 174, 0.14);
      }

      .menu-row-top {
        flex-wrap: wrap;
        gap: 8px 10px;
        align-items: center;
      }

      .menu-row-name {
        font-size: 20px;
        width: 100%;
      }

      .menu-row-leader {
        display: none;
      }

      .menu-row-price {
        margin-left: auto;
        font-size: 19px;
      }

      .menu-row-desc {
        font-size: 16px;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px dotted rgba(216, 199, 174, 0.18);
      }
    }

    /* ===== RESERVAS ===== */
    .reservas-wrap {
      min-height: calc(100vh - 80px);
      padding: 180px 0 120px;
      background:
        radial-gradient(ellipse at 30% 0%, rgba(181, 136, 88, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(138, 106, 68, 0.10) 0%, transparent 50%),
        var(--preto-vintage);
      position: relative;
    }

    .reservas-grid {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: 100px;
      align-items: start;
    }

    .reservas-side h2 {
      font-family: var(--font-display);
      font-size: clamp(48px, 6.5vw, 92px);
      line-height: 0.95;
      color: var(--off-white);
      margin-bottom: 30px;
    }

    .reservas-side h2 em {
      color: var(--bronze-glow);
      font-style: italic;
    }

    .reservas-side p {
      font-size: 19px;
      line-height: 1.6;
      color: var(--bege-areia);
      margin-bottom: 18px;
    }

    .reservas-info {
      margin-top: 48px;
      padding-top: 30px;
      border-top: 1px solid rgba(138, 106, 68, 0.3);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
    }

    .ri-label {
      font-family: var(--font-rock);
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--bronze-glow);
      margin-bottom: 8px;
    }

    .ri-value {
      font-family: var(--font-display);
      font-size: 20px;
      color: var(--off-white);
      line-height: 1.3;
    }

    .ri-value .small {
      display: block;
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--bege-areia);
      font-style: italic;
      margin-top: 4px;
    }

    /* Form */
    .form-card {
      background: var(--grafite-soft);
      border: 1px solid rgba(138, 106, 68, 0.3);
      padding: 56px 56px 48px;
      position: relative;
    }

    .form-card::before {
      content: "";
      position: absolute;
      top: -1px;
      left: -1px;
      width: 36px;
      height: 36px;
      border-top: 2px solid var(--bronze-glow);
      border-left: 2px solid var(--bronze-glow);
    }

    .form-card::after {
      content: "";
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 36px;
      height: 36px;
      border-bottom: 2px solid var(--bronze-glow);
      border-right: 2px solid var(--bronze-glow);
    }

    .form-eyebrow {
      font-family: var(--font-rock);
      font-size: 11px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--bronze-glow);
      margin-bottom: 6px;
    }

    .form-title {
      font-family: var(--font-display);
      font-size: 34px;
      color: var(--off-white);
      margin-bottom: 32px;
      line-height: 1.1;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-field.full {
      grid-column: 1 / -1;
    }

    .form-field label {
      font-family: var(--font-rock);
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--bronze-glow);
    }

    .form-field input,
    .form-field select,
    .form-field textarea {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(216, 199, 174, 0.3);
      padding: 12px 0;
      font-family: var(--font-body);
      font-size: 19px;
      color: var(--off-white);
      transition: border-color 0.3s ease;
      outline: none;
      border-radius: 0;
    }

    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus {
      border-bottom-color: var(--bronze-glow);
    }

    .form-field input::placeholder,
    .form-field textarea::placeholder {
      color: rgba(244, 240, 234, 0.35);
      font-style: italic;
    }

    .form-field select {
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23B58858' stroke-width='1' fill='none'/></svg>");
      background-repeat: no-repeat;
      background-position: right 4px center;
      padding-right: 22px;
    }

    .form-field select option {
      background: var(--grafite-soft);
      color: var(--off-white);
    }

    .form-submit {
      margin-top: 38px;
      width: 100%;
      background: var(--off-white);
      color: var(--preto-vintage);
      padding: 22px;
      font-family: var(--font-rock);
      font-size: 12px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .form-submit:hover {
      background: var(--bronze-glow);
      color: var(--off-white);
      letter-spacing: 0.55em;
    }

    /* Card de reservas por ligação */
    .call-card {
      display: flex;
      flex-direction: column;
    }

    .call-text {
      font-size: 19px;
      line-height: 1.6;
      color: var(--bege-areia);
      margin-bottom: 8px;
    }

    .call-btn {
      display: block;
      text-align: center;
      text-decoration: none;
    }

    .call-hours {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      margin-top: 26px;
      padding-top: 22px;
      border-top: 1px dashed rgba(138, 106, 68, 0.5);
      font-family: var(--font-rock);
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(216, 199, 174, 0.75);
    }

    .call-alt {
      margin-top: 24px;
      text-align: center;
      font-size: 16px;
      font-style: italic;
      color: rgba(216, 199, 174, 0.7);
    }

    .call-alt a {
      color: var(--azul-glow);
      border-bottom: 1px solid rgba(37, 150, 209, 0.4);
      transition: color 0.3s ease, border-color 0.3s ease;
    }

    .call-alt a:hover {
      color: var(--off-white);
      border-color: var(--off-white);
    }

    @media (max-width: 1200px) and (min-width: 901px) {
      .reservas-grid {
        gap: 56px;
      }
    }

    @media (max-width: 900px) {
      .reservas-grid {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .form-card {
        padding: 40px 24px;
      }

      .reservas-info {
        grid-template-columns: 1fr;
      }
    }

    /* Footer */
    .footer {
      border-top: 1px solid rgba(138, 106, 68, 0.2);
      padding: 60px 0 30px;
      background: var(--preto-vintage);
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 1fr;
      gap: 60px;
      margin-bottom: 50px;
    }

    .footer-brand {
      font-family: var(--font-display);
      font-size: 32px;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      color: var(--off-white);
    }

    .footer-tag {
      font-style: italic;
      color: var(--bege-areia);
      font-size: 16px;
      max-width: 280px;
    }

    .footer-col h4 {
      font-family: var(--font-rock);
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--bronze-glow);
      margin-bottom: 18px;
      font-weight: 400;
    }

    .footer-col p,
    .footer-col a {
      font-size: 15px;
      color: rgba(244, 240, 234, 0.7);
      display: block;
      margin-bottom: 8px;
      transition: color 0.3s ease;
    }

    .footer-col a:hover {
      color: var(--azul-glow);
    }

    .footer-bottom {
      border-top: 1px solid rgba(216, 199, 174, 0.10);
      padding-top: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-rock);
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(244, 240, 234, 0.4);
    }

    @media (max-width: 800px) {
      .footer-grid {
        grid-template-columns: 1fr 1fr;
        gap: 32px;
      }

      .footer-bottom {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }
    }

    /* ===== Stagger animations ===== */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.9s cubic-bezier(0.2, 0.7, 0.2, 1),
        transform 0.9s cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal.d1 {
      transition-delay: 0.08s;
    }

    .hero-wordmark.reveal {
      transform: translateY(100px);
    }

    .hero-wordmark.reveal.in {
      transform: translateY(-100px);
    }

    .hero-resto.reveal.in {
      transform: translateY(-100px);
    }

    .hero-eyebrow.reveal.in {
      transform: translateY(60px);
    }

    .hero-ctas.reveal.in {
      transform: translateY(-40px);
    }

    @media (max-width: 1366px) and (min-width: 701px) {
      .hero-eyebrow {
        display: none;
      }

      .hero-tagline {
        display: none;
      }

      /* Verso do Titãs em versão compacta, alinhado ao texto deslocado da hero */
      .hero-verse {
        font-size: 14px;
        line-height: 1.65;
        max-width: 490px;
        margin: 6px auto 0;
      }

      .hero-verse.reveal.in {
        transform: translateY(-75px);
      }

      .hero-verse-author {
        margin-top: 8px;
      }

      .hero-ctas .btn {
        margin-top: 36px;
        margin-bottom: 36px;
      }

      .hero-ctas.reveal.in {
        transform: translateY(-95px);
      }
    }

    .reveal.d2 {
      transition-delay: 0.16s;
    }

    .reveal.d3 {
      transition-delay: 0.24s;
    }

    .reveal.d4 {
      transition-delay: 0.32s;
    }

    .reveal.d5 {
      transition-delay: 0.4s;
    }

    .reveal.d6 {
      transition-delay: 0.48s;
    }

    /* Page enter */
    .page-enter {
      animation: pageIn 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Ornaments */
    .ornament {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--bronze-rock);
    }

    .ornament .dot {
      width: 5px;
      height: 5px;
      background: var(--bronze-rock);
      border-radius: 50%;
    }

    .ornament .line {
      width: 36px;
      height: 1px;
      background: var(--bronze-rock);
    }

    /* Price: consultar */
    .price-tba {
      font-family: var(--font-body);
      font-style: italic;
      opacity: 0.55;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
    }

    /* Admin panel */
    .admin-page {
      padding: 100px 0 120px;
    }

    /* ═══════ ADMIN — Área da casa (feito para uso leigo) ═══════ */
    .adm-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 26px;
    }

    .adm-status {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.95rem;
      color: var(--azul-glow);
      opacity: 0.85;
    }

    .adm-help {
      background: rgba(138, 106, 68, 0.12);
      border: 1px solid rgba(138, 106, 68, 0.3);
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 36px;
      font-size: 1.02rem;
      line-height: 1.6;
      color: var(--bege-areia);
    }

    /* Botões do admin: texto normal, grandes e legíveis */
    .adm-btn {
      display: inline-block;
      font-family: var(--font-rock);
      font-weight: 400;
      font-size: 15px;
      letter-spacing: 0.04em;
      text-transform: none;
      padding: 13px 22px;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
      transition: all 0.25s ease;
      line-height: 1.2;
    }

    .adm-btn-gold {
      background: var(--bronze-glow);
      color: #16120c;
      border: 1px solid var(--bronze-glow);
    }

    .adm-btn-gold:hover {
      background: #c99a66;
      transform: translateY(-1px);
    }

    .adm-btn-line {
      background: transparent;
      color: var(--off-white);
      border: 1px solid rgba(244, 240, 234, 0.3);
    }

    .adm-btn-line:hover {
      border-color: var(--azul-glow);
      color: var(--azul-glow);
    }

    .adm-btn-danger {
      color: #e08a7e;
      border-color: rgba(192, 57, 43, 0.5);
    }

    .adm-btn-danger:hover {
      border-color: #c0392b;
      color: #c0392b;
    }

    /* ── Tela 1: cards de cardápios ── */
    .adm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 18px;
      margin-bottom: 44px;
    }

    .adm-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 22px;
    }

    .adm-badge {
      font-family: var(--font-rock);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 20px;
    }

    .adm-badge.on {
      color: var(--azul-glow);
      background: rgba(37, 150, 209, 0.12);
      border: 1px solid rgba(37, 150, 209, 0.4);
    }

    .adm-badge.off {
      color: rgba(244, 240, 234, 0.55);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .adm-card-name {
      font-family: var(--font-display);
      font-size: 1.5rem;
      line-height: 1.15;
    }

    .adm-card-sub {
      font-size: 0.95rem;
      font-style: italic;
      color: var(--bege-areia);
      opacity: 0.85;
    }

    .adm-card-count {
      font-size: 0.85rem;
      opacity: 0.5;
      margin-bottom: 6px;
    }

    .adm-card .adm-btn {
      width: 100%;
      margin-top: auto;
    }

    .adm-card-new {
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-style: dashed;
      border-color: rgba(216, 199, 174, 0.35);
      background: transparent;
      color: var(--bege-areia);
      font-family: var(--font-rock);
      font-size: 15px;
      min-height: 170px;
      cursor: pointer;
      transition: border-color 0.25s ease, color 0.25s ease;
    }

    .adm-card-new:hover {
      border-color: var(--azul-glow);
      color: var(--azul-glow);
    }

    .adm-card-new-plus {
      font-size: 2.2rem;
      line-height: 1;
      font-family: var(--font-display);
    }

    /* ── Quadro "Publicar no site" ── */
    .adm-publish {
      border: 1px solid rgba(37, 150, 209, 0.35);
      background: rgba(37, 150, 209, 0.06);
      border-radius: 10px;
      padding: 26px 26px 22px;
    }

    .adm-publish-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin-bottom: 10px;
    }

    .adm-publish p {
      font-size: 1.02rem;
      line-height: 1.6;
      color: var(--bege-areia);
      margin-bottom: 18px;
      max-width: 640px;
    }

    .adm-advanced {
      margin-top: 18px;
    }

    .adm-advanced summary {
      cursor: pointer;
      font-size: 0.92rem;
      opacity: 0.55;
      letter-spacing: 0.04em;
    }

    .adm-advanced summary:hover {
      opacity: 0.9;
    }

    .adm-advanced-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    /* ── Tela 2: editor ── */
    .adm-back {
      font-family: var(--font-rock);
      font-size: 14px;
      letter-spacing: 0.06em;
      color: var(--bege-areia);
      padding: 8px 0;
      transition: color 0.25s ease;
    }

    .adm-back:hover {
      color: var(--azul-glow);
    }

    .adm-box {
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 26px;
    }

    .adm-box-title {
      font-family: var(--font-rock);
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--bronze-glow);
      padding-bottom: 14px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(216, 199, 174, 0.12);
    }

    .adm-hint {
      font-size: 0.85rem;
      font-style: italic;
      opacity: 0.5;
    }

    /* Interruptor grande "aparece no site" */
    .adm-switch-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 22px;
      cursor: pointer;
      flex-wrap: wrap;
    }

    .adm-switch {
      position: relative;
      display: inline-block;
      width: 58px;
      height: 30px;
      flex: 0 0 auto;
    }

    .adm-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .adm-switch-slider {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 30px;
      transition: background 0.25s ease, border-color 0.25s ease;
    }

    .adm-switch-slider::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 3px;
      top: 3px;
      background: var(--off-white);
      border-radius: 50%;
      transition: transform 0.25s ease;
    }

    .adm-switch input:checked+.adm-switch-slider {
      background: var(--azul-carmelita);
      border-color: var(--azul-carmelita);
    }

    .adm-switch input:checked+.adm-switch-slider::before {
      transform: translateX(28px);
    }

    .adm-switch-label {
      font-size: 1.05rem;
    }

    .adm-switch-label .on {
      color: var(--azul-glow);
    }

    .adm-switch-label .off {
      color: #e0b07e;
    }

    /* Seções (categorias) e pratos */
    .adm-cat {
      margin-bottom: 30px;
    }

    .adm-cat-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .adm-cat-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.35rem;
      color: var(--bronze-glow);
      font-weight: 400;
    }

    .adm-x {
      font-size: 1.1rem;
      line-height: 1;
      opacity: 0.35;
      padding: 4px 8px;
    }

    .adm-x:hover {
      opacity: 1;
      color: #c0392b;
    }

    .adm-empty {
      font-style: italic;
      opacity: 0.45;
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .adm-dish {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 8px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.02);
    }

    .adm-dish-info {
      flex: 1;
      min-width: 0;
    }

    .adm-dish-name {
      font-family: var(--font-display);
      font-size: 1.15rem;
    }

    .adm-dish-desc {
      font-size: 0.92rem;
      opacity: 0.6;
      margin-top: 2px;
    }

    .adm-dish-price {
      font-family: var(--font-body);
      font-style: italic;
      white-space: nowrap;
      opacity: 0.85;
    }

    .adm-dish-actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .adm-dish-actions .adm-btn {
      padding: 9px 16px;
      font-size: 13px;
    }

    .adm-add-dish {
      display: block;
      width: 100%;
      text-align: center;
      padding: 12px;
      border: 1px dashed rgba(216, 199, 174, 0.35);
      border-radius: 8px;
      color: var(--bege-areia);
      font-family: var(--font-rock);
      font-size: 14px;
      letter-spacing: 0.04em;
      margin-top: 4px;
      transition: border-color 0.25s ease, color 0.25s ease;
    }

    .adm-add-dish:hover {
      border-color: var(--azul-glow);
      color: var(--azul-glow);
    }

    .adm-dish-form {
      background: rgba(37, 150, 209, 0.05);
      border: 1px solid rgba(37, 150, 209, 0.3);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 12px;
    }

    .adm-dish-form-title {
      font-family: var(--font-display);
      font-size: 1.15rem;
      margin-bottom: 14px;
    }

    .adm-form-btns {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .adm-new-cat {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 18px;
      border-top: 1px dashed rgba(216, 199, 174, 0.2);
    }

    .adm-new-cat input {
      flex: 1;
      min-width: 220px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      color: var(--off-white);
      padding: 11px 13px;
      font-family: var(--font-body);
      font-size: 1.05rem;
    }

    /* Formulários do admin */
    .admin-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 600px) {
      .admin-form-grid {
        grid-template-columns: 1fr;
      }
    }

    .admin-form input,
    .admin-form textarea,
    .admin-form select,
    .adm-box input,
    .adm-box textarea,
    .adm-box select,
    .adm-dish-form input,
    .adm-dish-form textarea,
    .adm-dish-form select {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      color: var(--off-white);
      padding: 11px 13px;
      font-family: var(--font-body);
      font-size: 1.05rem;
    }

    .adm-box .form-field label,
    .adm-dish-form .form-field label {
      font-family: var(--font-rock);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: none;
      color: rgba(244, 240, 234, 0.75);
    }

    .adm-box textarea,
    .adm-dish-form textarea {
      resize: vertical;
    }

    /* Responsivo do admin */
    @media (max-width: 700px) {
      .admin-page {
        padding: 88px 0 80px;
      }

      .adm-dish {
        flex-wrap: wrap;
        row-gap: 8px;
      }

      .adm-dish-info {
        flex: 1 1 100%;
      }

      .adm-dish-price {
        order: 2;
      }

      .adm-dish-actions {
        order: 3;
        margin-left: auto;
      }

      .adm-advanced-row .adm-btn,
      .adm-publish>.adm-btn {
        width: 100%;
      }

      .adm-card .adm-btn {
        padding: 14px;
      }
    }

    /* Botão admin na nav */
    .nav-admin-btn {
      font-family: var(--font-rock);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      display: inline-block;
    }

    .nav-admin-btn:hover {
      color: var(--bege-areia);
      border-color: rgba(255, 255, 255, 0.4);
    }

    /* Crédito no footer */
    .footer-dev {
      text-align: center;
      padding-top: 16px;
      margin-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.8rem;
      opacity: 0.35;
      letter-spacing: 0.04em;
    }

    .footer-dev a {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .footer-dev a:hover {
      opacity: 0.8;
    }

    /* ===== Mobile global fixes ===== */
    @media (max-width: 700px) {

      html,
      body {
        font-size: 16px;
      }

      /* Sections */
      section.block {
        padding: 56px 0;
      }

      .sobre-hero {
        padding: 100px 0 36px;
      }

      .menu-hero {
        padding: 100px 0 36px;
      }

      .timeline {
        padding: 56px 0;
      }

      .reservas-wrap {
        padding: 100px 0 56px;
      }

      .pullquote {
        padding: 56px 0;
      }

      /* Hero */
      .hero-wordmark {
        white-space: normal;
        font-size: clamp(64px, 18vw, 160px);
        /* O "a" final da fonte script tem um floreio que vaza ~1.5em além da
           caixa de layout; o padding faz o flex centralizar contando com ele */
        padding-right: 1.6em;
        margin-left: auto;
        margin-right: auto;
      }

      .hero-tagline {
        font-size: 18px;
        margin-bottom: 18px;
      }

      .hero-verse {
        font-size: 11.5px;
        line-height: 1.55;
        margin: 12px auto 0;
        max-width: 300px;
      }

      .hero-verse-author {
        margin-top: 8px;
        font-size: 9px;
      }

      .hero-ctas {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        margin-top: 40px;
      }

      .hero-ctas .btn {
        width: 100%;
        max-width: 300px;
        margin: 0;
      }

      .scroll-indicator {
        display: none;
      }

      /* Pullquote */
      .pullquote-mark {
        font-size: 72px;
      }

      .pullquote-text {
        font-size: clamp(22px, 6.5vw, 36px);
        padding: 0 12px;
      }

      /* Sobre */
      .sobre-hero-title {
        font-size: clamp(36px, 10vw, 72px);
      }

      .sobre-hero-lead {
        font-size: 18px;
      }

      .sobre-editorial {
        padding: 40px 0 32px;
      }

      /* Block titles */
      .block-title {
        font-size: clamp(30px, 8vw, 56px);
      }

      .block-sub {
        font-size: 18px;
      }

      /* Buttons: eventos section full-width centered */
      .btn-ghost {
        max-width: 100%;
        word-break: break-word;
      }

      section .btn {
        max-width: 300px;
        width: 100%;
      }

      section>.container>.reveal>.btn,
      section>.container>div>.reveal>.btn {
        display: block;
        margin: 0 auto;
      }

      /* CTA strip center */
      section [style*="inline-flex"] {
        flex-direction: column;
        align-items: center;
      }

      /* Cardápio editorial */
      .menu-section {
        margin-bottom: 52px;
      }

      .menu-section-head {
        gap: 16px;
        margin-bottom: 26px;
      }

      /* Form card */
      .form-card {
        padding: 32px 18px;
      }

      .form-title {
        font-size: 26px;
      }

      /* Footer */
      .footer-grid {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .footer-bottom {
        flex-direction: column;
        gap: 10px;
